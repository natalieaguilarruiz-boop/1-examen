<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>VSIAF</title>

<style>

/* GENERAL */
body{
    background:#e5e5e5;
    font-family: Tahoma, Arial;
}

/* CONTENEDOR */
.caja{
    width:520px;
    margin:30px auto;
    background:#ffffff;
    border:1px solid #7f7f7f;
}

/* BARRA */
.barra{
    background:#1a1a1a;
    color:white;
    padding:4px;
    font-size:12px;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    background:linear-gradient(to right,#0d3c61,#3c7fb1,#0d3c61);
    color:white;
    padding:12px;
}

/* BANDERA MEJORADA */
.bandera{
    width:65px;
    height:45px;
    margin-right:10px;
    transform:skew(-12deg);
    border:1px solid #333;
    box-shadow:2px 2px 3px rgba(0,0,0,0.3);
    overflow:hidden;
}
.bandera div{
    height:33.3%;
}
.rojo{background:#d60000;}
.amarillo{background:#ffd400;}
.verde{background:#007a33;}

/* TITULO */
.titulo{
    font-size:22px;
    font-weight:bold;
    letter-spacing:2px;
}

/* LOGIN */
.login-contenedor{
    display:flex;
    justify-content:center;
    padding:20px;
}
/* LOGIN CON EFECTO 3D */
.login{
    width:360px;
    background:#dcdcdc;
    border:2px solid;
    border-top-color:#ffffff;
    border-left-color:#ffffff;
    border-bottom-color:#7f7f7f;
    border-right-color:#7f7f7f;
    border-radius:5px;
    padding:15px;
}

/* INPUT 3D HUNDIDO */
input, textarea{
    width:95%;
    padding:5px;
    margin:5px 0;
    background:#ffffff;

    border:2px solid;
    border-top-color:#7f7f7f;
    border-left-color:#7f7f7f;
    border-bottom-color:#ffffff;
    border-right-color:#ffffff;
}

/* EFECTO ENFOQUE (opcional pero más real) */
input:focus, textarea:focus{
    outline:none;
    background:#f5faff;
}
.login{
    width:360px;
    background:linear-gradient(#dfeaf5,#c2d8ee);
    border:1px solid #8aa8c5;
    border-radius:8px;
    padding:15px;
}

.login hr{
    border:1px solid #8aa8c5;
}

/* INPUT */
input, textarea{
    width:95%;
    padding:5px;
    margin:5px 0;
    border:1px solid #7f9db9;
    background:#eaf2fb;
}

/* BOTONES 3D REALES */
button{
    padding:4px 12px;
    border:2px solid;
    border-top-color:#ffffff;
    border-left-color:#ffffff;
    border-bottom-color:#7f7f7f;
    border-right-color:#7f7f7f;
    background:#dcdcdc;
    font-size:12px;
    cursor:pointer;
}

button:active{
    border-top-color:#7f7f7f;
    border-left-color:#7f7f7f;
    border-bottom-color:#ffffff;
    border-right-color:#ffffff;
}

/* BOTON LOGIN */
.btn{
    float:right;
}

/* FOOTER */
.footer{
    background:#0d3c61;
    color:white;
    padding:10px;
    font-size:12px;
}

/* ================= SEGURIDAD ================= */

.seguridad-header{
    background:linear-gradient(#3f7fb3,#1f4e79);
    color:white;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

/* CONTENEDOR */
.seguridad-box{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:15px;
}

/* PANEL GRANDE */
.panel-interno{
    width:95%;
    background:#efefef;
    border:2px solid #a6a6a6;
    border-radius:12px;
    padding:15px;
}

/* SUB CUADRO */
.sub-top{
    display:flex;
    justify-content:space-between;
    background:#f7f7f7;
    border:1px solid #bdbdbd;
    border-radius:8px;
    padding:10px;
    margin-bottom:10px;
}

.campo{ width:48%; }

/* FILAS */
.fila{
    margin-bottom:10px;
}

/* RADIO */
.radio{
    margin-top:5px;
}

/* BOTONES */
.panel-botones{
    width:95%;
    margin-top:10px;
    padding:10px;
    border:2px solid #a6a6a6;
    background:#e9e9e9;
    text-align:center;
}

/* BOTON EDITAR AZUL */
.editar{
    background:linear-gradient(#2c6fa3,#1e4f7a);
    color:white;
    border-top-color:#ffffff;
    border-left-color:#ffffff;
    border-bottom-color:#1e4f7a;
    border-right-color:#1e4f7a;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div class="caja">

    <div class="barra">INGRESE SU IDENTIFICACION</div>

    <div class="header">
        <div class="bandera">
            <div class="rojo"></div>
            <div class="amarillo"></div>
            <div class="verde"></div>
        </div>

        <div>
            <div class="titulo">V . S . I . A . F</div>
            <div>Sistema de Activos Fijos</div>
        </div>
    </div>

    <div class="login-contenedor">
        <div class="login">
            <b>Login</b>
            <hr>

            <label>Nombre del Usuario:</label>
            <input type="text" value="admin">

            <label>Contraseña:</label>
            <input type="password" value="12345">

            <button class="btn">Aceptar</button>

            <p style="font-size:12px;">
                <b>NOTA:</b> Es sensible al contexto
            </p>
        </div>
    </div>

    <div class="footer">
        VSIAF versión 2.0 <br>
        Copyright 1999-2012 DGSIGF <br>
        Todos los derechos reservados
    </div>

</div>

<!-- SEGURIDAD -->
<div class="caja">

    <div class="barra">SEGURIDAD</div>

    <div class="seguridad-header">SEGURIDAD</div>

    <div class="seguridad-box">

        <div class="panel-interno">

            <div class="sub-top">
                <div class="campo">
                    <label>USUARIO:</label>
                    <input type="text" value="admin">
                </div>

                <div class="campo">
                    <label>CONTRASEÑA ASIGNADA:</label>
                    <input type="password" value="12345">
                </div>
            </div>

            <div class="fila">
                <label>NOMBRE COMPLETO:</label>
                <input type="text" value="Administrador">
            </div>

            <div class="fila">
                <label>DESCRIPCIÓN:</label>
                <textarea></textarea>
            </div>

            <div class="fila">
                <label>TIPO DE USUARIO:</label>
                <div class="radio">
                    <input type="radio" name="tipo"> Operador
                    <input type="radio" name="tipo" checked> Administrador
                </div>
            </div>

        </div>

        <div class="panel-botones">
            <button>Primero</button>
            <button>Anterior</button>
            <button>Siguiente</button>
            <button>Último</button>
            <button>Nuevo</button>
            <button class="editar">Editar</button>
            <button>Guardar</button>
            <button>Deshacer</button>
            <button>Salir</button>
        </div>

    </div>

</div>

</body>
</html>
